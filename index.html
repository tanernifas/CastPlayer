<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAN Stream to Android TV</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; }
  input, button, select { width: 100%; padding: 0.8rem; margin: 0.5rem 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
  button { background: #0056b3; color: white; cursor: pointer; font-weight: 500; }
  button:hover { background: #004494; }
  .row { display: flex; gap: 0.5rem; }
  .row > * { flex: 1; }
  .status { margin-top: 1rem; padding: 0.8rem; background: #f5f5f5; border-radius: 8px; word-break: break-all; }
  .hidden { display: none; }
  img { max-width: 150px; display: block; margin: 0.5rem auto; }
</style>
</head>
<body>

<h2>📺 Отправка потока на Android TV</h2>

<label>IP-адрес TV</label>
<input type="text" id="tvIp" placeholder="192.168.x.x" value="">

<label>Логин / Пароль (если требуется)</label>
<div class="row">
  <input type="text" id="user" placeholder="admin" value="">
  <input type="password" id="pass" placeholder="пароль" value="">
</div>

<label>Прямая ссылка на поток (.m3u8, .mp4, .mpd)</label>
<input type="url" id="streamUrl" placeholder="https://cdn.example.com/video.m3u8">

<label>Плеер на TV</label>
<select id="player">
  <option value="vlc">VLC for Android</option>
  <option value="kodi">Kodi</option>
  <option value="intent">Android Intent (vlc://)</option>
</select>

<button onclick="sendToTV()">▶ Отправить на TV</button>
<button onclick="generateQR()">📱 Показать QR для TV</button>
<div id="qrBlock" class="hidden"><img id="qrImg" alt="QR"></div>

<div class="status" id="status">Готово. Введите данные и нажмите "Отправить".</div>

<script>
function getAuth() {
  const u = document.getElementById('user').value.trim();
  const p = document.getElementById('pass').value.trim();
  return (u && p) ? `${u}:${p}@` : '';
}

function sendToTV() {
  const ip = document.getElementById('tvIp').value.trim();
  const url = document.getElementById('streamUrl').value.trim();
  const player = document.getElementById('player').value;
  const status = document.getElementById('status');

  if (!ip || !url) { status.textContent = '⚠️ Заполните IP и ссылку на поток'; return; }

  const encoded = encodeURIComponent(url);
  let reqUrl = '';

  if (player === 'vlc') {
    reqUrl = `http://${getAuth()}${ip}:8080/requests/status.json?command=in_play&input=${encoded}`;
  } else if (player === 'kodi') {
    reqUrl = `http://${getAuth()}${ip}:8080/jsonrpc`;
    const payload = JSON.stringify({
      jsonrpc: "2.0", method: "Player.Open",
      params: { item: { file: url } }, id: 1
    });
    // Kodi требует POST, используем fetch с no-cors (fire-and-forget)
    fetch(reqUrl, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: payload, mode: 'no-cors'
    }).then(() => status.textContent = '✅ Команда отправлена в Kodi (проверьте TV)')
      .catch(e => status.textContent = `❌ Ошибка: ${e.message}`);
    return;
  } else {
    // Intent fallback
    window.location.href = `vlc://${encoded}`;
    status.textContent = '📱 Попытка открыть через Intent (работает если на TV есть обработчик)';
    return;
  }

  // VLC GET-запрос (no-cors обходит блокировку CORS в браузере)
  fetch(reqUrl, { mode: 'no-cors' })
    .then(() => status.textContent = '✅ Команда отправлена в VLC. Проверьте TV.')
    .catch(e => status.textContent = `❌ Ошибка отправки: ${e.message}`);
}

function generateQR() {
  const url = document.getElementById('streamUrl').value.trim();
  if (!url) return;
  const qr = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}`;
  document.getElementById('qrImg').src = qr;
  document.getElementById('qrBlock').classList.remove('hidden');
}
</script>
</body>
</html>
