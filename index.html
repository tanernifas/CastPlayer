<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Video Cast Player</title>
  <!-- Cast SDK v3 -->
  <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e8e8f0;
      min-height: 100vh;
      padding: 16px;
    }
    .container { max-width: 640px; margin: 0 auto; }
    
    .header { text-align: center; padding: 20px 0 16px; }
    .header h1 {
      font-size: 1.4rem;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #6c5ce7, #00cec9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-weight: 600;
      background: #2a2a4a;
      color: #888;
    }
    .badge.active { background: #00c853; color: #000; }
    .badge.disabled { background: #ff5252; color: #fff; }

    /* Cast Button Area */
    .cast-area {
      background: rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .cast-area.hidden { display: none; }
    
    .cast-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .cast-title {
      font-size: 0.85rem;
      color: #888;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    /* Custom Cast Button */
    .cast-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: linear-gradient(135deg, #6c5ce7, #7f70f0);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }
    .cast-btn:active { transform: scale(0.97); }
    .cast-btn:hover { opacity: 0.9; }
    .cast-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }
    .cast-btn.connected {
      background: linear-gradient(135deg, #00c853, #00e676);
      color: #000;
    }
    .cast-btn.connecting {
      background: linear-gradient(135deg, #fdcb6e, #f39c12);
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    
    .cast-status {
      font-size: 0.8rem;
      color: #888;
      padding: 0 4px;
    }
    .cast-status.connected { color: #00c853; }

    .input-group {
      background: rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .input-group label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 8px; }
    .input-row { display: flex; gap: 8px; }
    .input-row input {
      flex: 1; padding: 12px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3); color: #fff; font-size: 0.9rem; outline: none;
    }
    .input-row input:focus { border-color: #6c5ce7; }
    .btn {
      padding: 12px 18px; background: linear-gradient(135deg, #6c5ce7, #7f70f0);
      color: white; border: none; border-radius: 10px; cursor: pointer;
      font-weight: 600; font-size: 0.9rem; white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .quick-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .quick-links .btn { padding: 7px 12px; font-size: 0.8rem; background: rgba(255,255,255,0.1); }

    .player-wrapper {
      background: #000; border-radius: 14px; overflow: hidden;
      position: relative; aspect-ratio: 16/9;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .player-wrapper video { width: 100%; height: 100%; display: block; }
    .placeholder {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: #555; gap: 10px;
    }
    .placeholder svg { width: 56px; height: 56px; fill: #333; }

    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: #1a1a2e; border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 18px; border-radius: 10px; font-size: 0.85rem;
      z-index: 9999; transition: transform 0.3s; pointer-events: none;
      max-width: 90%; text-align: center;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: #ff5252; }
    .toast.success { border-color: #00c853; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📺 Video Player</h1>
    <span class="badge" id="protocolBadge">Загрузка...</span>
  </div>

  <!-- Cast Button Area -->
  <div class="cast-area" id="castArea">
    <div class="cast-header">
      <span class="cast-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm0-4v2c4.97 0 9 4.03 9 9h2c0-6.08-4.93-11-11-11zm20-7H3c-1.1 0-2 .9-2 2v3h2V5h18v14h-7v2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
        </svg>
        Chromecast
      </span>
      <button class="cast-btn" id="castBtn" onclick="toggleCast()">
        <svg viewBox="0 0 24 24">
          <path d="M1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm0-4v2c4.97 0 9 4.03 9 9h2c0-6.08-4.93-11-11-11zm20-7H3c-1.1 0-2 .9-2 2v3h2V5h18v14h-7v2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
        </svg>
        <span id="castBtnText">Подключить</span>
      </button>
    </div>
    <div class="cast-status" id="castStatus">Нажмите для поиска устройств</div>
  </div>

  <div class="input-group">
    <label>🔗 Ссылка на видео</label>
    <div class="input-row">
      <input type="text" id="videoUrl" placeholder="https://example.com/video.mp4"
             value="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4">
      <button class="btn" id="playBtn" onclick="handlePlay()">▶ Play</button>
    </div>
    <div class="quick-links">
      <button class="btn" onclick="setUrl('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4')">Big Buck Bunny</button>
      <button class="btn" onclick="setUrl('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4')">Sintel</button>
      <button class="btn" onclick="setUrl('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">HLS Test</button>
    </div>
  </div>

  <div class="player-wrapper">
    <video id="videoPlayer" controls playsinline webkit-playsinline></video>
    <div class="placeholder" id="placeholder">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <p>Введите ссылку и нажмите Play</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ═══════════════════════════════════════
  //  Protocol Detection
  // ═══════════════════════════════════════
  const protocol = window.location.protocol;
  const isFile = protocol === 'file:';
  const badge = document.getElementById('protocolBadge');
  const castArea = document.getElementById('castArea');
  const castBtn = document.getElementById('castBtn');
  const castBtnText = document.getElementById('castBtnText');
  
  if (isFile) {
    badge.textContent = '📁 Локальный файл';
    badge.className = 'badge disabled';
    castArea.classList.add('hidden');
  } else {
    badge.textContent = '🌐 Веб-сервер';
    badge.className = 'badge active';
  }

  // ═══════════════════════════════════════
  //  State & DOM
  // ═══════════════════════════════════════
  let castContext = null;
  let currentSession = null;
  let hlsInstance = null;
  
  const video = document.getElementById('videoPlayer');
  const placeholder = document.getElementById('placeholder');
  const toast = document.getElementById('toast');
  const urlInput = document.getElementById('videoUrl');
  const statusEl = document.getElementById('castStatus');

  // ═══════════════════════════════════════
  //  Toast
  // ═══════════════════════════════════════
  function showToast(msg, type = 'info', duration = 3000) {
    toast.textContent = msg;
    toast.className = `toast ${type}`;
    requestAnimationFrame(() => toast.classList.add('show'));
    setTimeout(() => toast.classList.remove('show'), duration);
  }

  // ═══════════════════════════════════════
  //  Local Playback
  // ═══════════════════════════════════════
  function playLocal() {
    const url = urlInput.value.trim();
    if (!url) return showToast('Введите ссылку', 'error');
    
    if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
    placeholder.style.display = 'none';
    
    const isHls = url.includes('.m3u8');
    if (isHls && window.Hls && Hls.isSupported()) {
      hlsInstance = new Hls();
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
    } else if (isHls && video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url; video.play().catch(()=>{});
    } else {
      video.src = url; video.play().catch(()=>{});
    }
    showToast('▶️ Воспроизведение');
  }

  function setUrl(u) { urlInput.value = u; }

  // ═══════════════════════════════════════
  //  Cast SDK - Custom Button (v3 Fixed)
  // ═══════════════════════════════════════
  if (!isFile) {
    window['__onGCastApiAvailable'] = function(isAvailable) {
      if (!isAvailable) {
        statusEl.textContent = '❌ Cast не поддерживается';
        castBtn.disabled = true;
        return;
      }
      
      try {
        castContext = cast.framework.CastContext.getInstance();
        castContext.setOptions({
          receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
          autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
        });

        // ✅ Используем правильный event type
        castContext.addEventListener(
          cast.framework.CastContextEventType.SESSION_STATE_CHANGED,
          onCastSessionChange
        );
        
        statusEl.textContent = 'Нажмите для поиска устройств';
        console.log('✅ Cast SDK initialized');
        
      } catch (e) {
        console.error('Cast init error:', e);
        statusEl.textContent = '⚠️ Cast недоступен';
        castBtn.disabled = true;
      }
    };

    function onCastSessionChange(event) {
      if (!event) return;
      
      // State: CONNECTED
      if (event.sessionState === cast.framework.SessionState.SESSION_STARTED) {
        currentSession = castContext.getCurrentSession();
        if (currentSession) {
          const dev = currentSession.getDevice();
          statusEl.innerHTML = `✅ <strong>${escapeHtml(dev.friendlyName)}</strong>`;
          statusEl.className = 'cast-status connected';
          castBtn.classList.add('connected');
          castBtn.classList.remove('connecting');
          castBtnText.textContent = 'Отключить';
          showToast(`Подключено: ${dev.friendlyName}`, 'success');
        }
      } 
      // State: DISCONNECTED
      else if (event.sessionState === cast.framework.SessionState.SESSION_ENDED ||
               event.sessionState === cast.framework.SessionState.SESSION_SUSPENDED) {
        currentSession = null;
        statusEl.textContent = 'Нажмите для поиска устройств';
        statusEl.className = 'cast-status';
        castBtn.classList.remove('connected');
        castBtn.classList.remove('connecting');
        castBtnText.textContent = 'Подключить';
      }
      // State: CONNECTING
      else if (event.sessionState === cast.framework.SessionState.SESSION_STARTING) {
        castBtn.classList.add('connecting');
        castBtnText.textContent = 'Подключение...';
        statusEl.textContent = '🔄 Подключение...';
      }
    }
  }

  // ═══════════════════════════════════════
  //  Toggle Cast (ИСПРАВЛЕНО)
  // ═══════════════════════════════════════
  function toggleCast() {
    if (!castContext) {
      showToast('Cast SDK не загружен', 'error');
      return;
    }

    if (currentSession) {
      // Отключить
      castContext.endCurrentSession();
    } else {
      // Подключить
      // ✅ В v3 SDK используется requestSession() вместо getSessionManager()
      castContext.requestSession()
        .then(() => {
          // Успешный запрос сессии (но еще не старт)
          console.log('Session requested');
        })
        .catch((error) => {
          // Обработка отмены или ошибки
          if (error.code !== 'cancel') {
            console.error('Cast error', error);
            showToast('Не удалось подключиться', 'error');
          }
          castBtn.classList.remove('connecting');
          castBtnText.textContent = 'Подключить';
        });
    }
  }

  // ═══════════════════════════════════════
  //  Smart Play Handler
  // ═══════════════════════════════════════
  function handlePlay() {
    if (currentSession) castToTV();
    else playLocal();
  }

  function castToTV() {
    const url = urlInput.value.trim();
    if (!currentSession || !url) return showToast('Ошибка кастинга', 'error');
    
    try {
      const type = getMimeType(url);
      const info = new chrome.cast.media.MediaInfo(url, type);
      
      const meta = new chrome.cast.media.GenericMediaMetadata();
      meta.title = decodeURIComponent(url.split('/').pop().split('?')[0] || 'Video');
      info.metadata = meta;
      
      info.streamType = url.includes('.m3u8') 
        ? chrome.cast.media.StreamType.LIVE 
        : chrome.cast.media.StreamType.BUFFERED;
        
      const req = new chrome.cast.media.LoadRequest(info);
      req.autoplay = true;
      
      statusEl.textContent = '🔄 Запуск на ТВ...';
      
      currentSession.loadMedia(req)
        .then(() => {
          statusEl.textContent = '▶️ Трансляция активна';
          showToast('▶️ Воспроизводится на ТВ', 'success');
        })
        .catch(err => {
          console.error('Cast error:', err);
          statusEl.textContent = '❌ Ошибка кастинга';
          showToast(err.description || 'Failed to cast', 'error');
        });
    } catch (e) {
      console.error('Cast error:', e);
      showToast('Ошибка: ' + e.message, 'error');
    }
  }

  // ═══════════════════════════════════════
  //  Helpers
  // ═══════════════════════════════════════
  function getMimeType(url) {
    const ext = url.toLowerCase().split('?')[0].split('.').pop();
    return {
      'mp4':'video/mp4','m4v':'video/mp4','mov':'video/mp4',
      'webm':'video/webm','ogg':'video/ogv','m3u8':'application/x-mpegURL'
    }[ext] || 'video/mp4';
  }
  
  function escapeHtml(s) { 
    const d=document.createElement('div'); 
    d.textContent=s; 
    return d.innerHTML; 
  }

  urlInput.addEventListener('keydown', e => { if(e.key==='Enter') handlePlay(); });
</script>

</body>
</html>
